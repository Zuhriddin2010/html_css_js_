<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>Sehrli Bashorat Shari</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="game-container">
        <h1>Sehrli Shar</h1>
        <p class="subtitle">Savolingizni o'ylang va sharni bosing...</p>

        <div class="eight-ball" id="ball" onclick="askQuestion()">

            <div class="inner-circle">
                <div class="answer" id="answer">8</div>
            </div>
        </div>

        <div class="input-area">
            <input type="text" id="questionInput" placeholder="Savolingizni yozing...">
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
